<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cúspides — Preparación para alta montaña</title>

  <!-- Tailwind vía CDN: no requiere instalación ni carpeta node_modules -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuentes del Figma: Anton (headlines) y Raleway (cuerpo/labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Raleway:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-[#f6f2f2]">

  <!-- ============ HERO ============ -->
  <section class="hero" id="hero">

    <!-- Fondo: foto de montaña + overlay de ruta + degradés de legibilidad -->
    <div class="hero__media" aria-hidden="true">
      <img
        src="https://www.figma.com/api/mcp/asset/02d6947f-5848-4b14-a98f-51b88507d7d4"
        alt=""
        class="hero__photo"
      />
      <!-- Línea de "ruta" dibujada a mano sobre la montaña -->
      <img
        src="https://www.figma.com/api/mcp/asset/a1cf3520-84c2-4818-a982-af1ead798996"
        alt=""
        class="hero__route-line"
      />
      <!-- Puntos de la ruta -->
      <span class="hero__dot" style="--x: 46.8%; --y: 36.4%;"></span>
      <span class="hero__dot" style="--x: 36.8%; --y: 45.1%;"></span>
      <span class="hero__dot" style="--x: 75.4%; --y: 60.6%;"></span>
      <span class="hero__dot" style="--x: 33.8%; --y: 66.4%;"></span>
      <span class="hero__dot" style="--x: 80.3%; --y: 87.8%;"></span>

      <!-- degradé oscuro abajo para que el texto blanco se lea -->
      <div class="hero__gradient"></div>
    </div>

    <!-- Nav -->
    <nav class="hero__nav reveal">
      <span class="hero__logo">CÚSPIDES</span>
      <button class="hero__menu-btn" aria-label="Abrir menú">
        <img
          src="https://www.figma.com/api/mcp/asset/94d9cd1a-ce94-4d98-b07c-888bf1e57c74"
          alt=""
          class="w-6 h-6"
        />
      </button>
    </nav>

    <!-- Headline central -->
    <div class="hero__content">
      <h1 class="hero__headline" id="hero-headline">
        <span class="hero__line">ALCANZÁ</span>
        <span class="hero__line">TU MÁXIMO</span>
      </h1>
    </div>

    <!-- Bloque inferior: frase + CTA -->
    <div class="hero__footer">
      <h2 class="hero__claim reveal">NO TODOS LLEGAN.</h2>
      <p class="hero__subclaim reveal">Pero te entrenamos para hacerlo realidad.</p>
      <a href="#proceso" class="hero__cta reveal">
        <span>Descubrí cómo</span>
        <img
          src="https://www.figma.com/api/mcp/asset/7c3f697b-e9da-4a5c-975c-b4f36b0602ed"
          alt=""
          class="hero__cta-arrow"
        />
      </a>
    </div>

  </section>
  <!-- ============ /HERO ============ -->

  <!-- Acá siguen las próximas secciones (proceso, equipo, testimonios...) -->

  <script type="module" src="js/main.js"></script>
</body>
</html>
